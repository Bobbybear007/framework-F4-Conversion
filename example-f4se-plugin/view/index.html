<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PrismaUI F4 — Bridge Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html {
            background-color: transparent !important;
            background: transparent !important;
        }
        body {
            background-color: transparent !important;
            background: transparent !important;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .panel {
            width: 500px;
            background: rgba(18, 18, 22, 0.97);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        /* ── Header ── */
        .panel-header {
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            box-shadow: 0 0 6px #3b82f6;
        }

        .panel-header-title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.03em;
        }

        .panel-header-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-left: auto;
        }

        /* ── Body ── */
        .panel-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Card ── */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 4px;
            padding: 12px 14px;
        }

        .card-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
        }

        /* ── Status row ── */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .badge-blue  { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        .badge-green { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .badge-amber { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }

        .status-text {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
        }

        /* ── Event log ── */
        .log {
            font-size: 11px;
            font-family: 'Consolas', 'Courier New', monospace;
            color: rgba(255,255,255,0.45);
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-height: 52px;
        }

        .log-entry {
            display: flex;
            gap: 8px;
        }

        .log-time { color: rgba(255,255,255,0.2); flex-shrink: 0; }
        .log-dir  { flex-shrink: 0; }
        .log-dir.in  { color: #3b82f6; }
        .log-dir.out { color: #22c55e; }
        .log-msg  { color: rgba(255,255,255,0.6); word-break: break-all; }

        .log-empty {
            color: rgba(255,255,255,0.18);
            font-style: italic;
        }

        /* ── JS → C++ send row ── */
        .send-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: rgba(255,255,255,0.8);
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 7px 10px;
            outline: none;
        }

        input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

        input[type="text"]:focus {
            border-color: rgba(59,130,246,0.5);
            background: rgba(59,130,246,0.05);
        }

        button {
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 4px;
            color: #3b82f6;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            padding: 7px 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s;
        }

        button:hover  { background: rgba(59,130,246,0.28); }
        button:active { background: rgba(59,130,246,0.45); }

        /* ── Footer ── */
        .panel-footer {
            padding: 9px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
        }

        .hint {
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.06em;
        }

        .hint kbd {
            color: rgba(255,255,255,0.45);
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 3px;
            padding: 1px 5px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="panel-header">
            <div class="panel-header-dot"></div>
            <div class="panel-header-title">PrismaUI F4 — Bridge Example</div>
            <div class="panel-header-sub">C++ ↔ JS</div>
        </div>

        <div class="panel-body">

            <!-- Focus state (driven by C++ via Invoke) -->
            <div class="card">
                <div class="card-label">Focus State — set from C++ via Invoke()</div>
                <div class="status-row">
                    <div class="badge badge-amber" id="focus-badge">UNFOCUSED</div>
                    <div class="status-text" id="focus-label">Press F3 to give this view input focus</div>
                </div>
            </div>

            <!-- Event log -->
            <div class="card">
                <div class="card-label">Bridge Event Log</div>
                <div class="log" id="log">
                    <div class="log-empty">No events yet.</div>
                </div>
            </div>

            <!-- JS → C++ send -->
            <div class="card">
                <div class="card-label">JS → C++ — calls sendDataToF4SE() listener</div>
                <div class="send-row">
                    <input id="data-input" type="text" placeholder="Payload to send to plugin..." />
                    <button onclick="sendInputData()">Send</button>
                </div>
            </div>

        </div>

        <div class="panel-footer">
            <div class="hint"><kbd>F3</kbd> Toggle Focus</div>
            <div class="hint">Check F4SE log for received data</div>
        </div>
    </div>

    <script>
        const logEl = document.getElementById('log');
        let logEmpty = true;

        function appendLog(direction, message) {
            if (logEmpty) { logEl.innerHTML = ''; logEmpty = false; }
            const now = new Date();
            const t = now.toTimeString().slice(0,8);
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${t}</span><span class="log-dir ${direction === 'in' ? 'in' : 'out'}">${direction === 'in' ? 'C++→JS' : 'JS→C++'}</span><span class="log-msg">${message}</span>`;
            logEl.appendChild(entry);
            if (logEl.children.length > 6) logEl.removeChild(logEl.children[0]);
        }

        // Called from C++ via: api->Invoke(view, "updateFocusLabel('...')")
        window.updateFocusLabel = (msg) => {
            const focused = msg.includes('Focused');
            document.getElementById('focus-label').textContent = msg;
            const badge = document.getElementById('focus-badge');
            badge.textContent = focused ? 'FOCUSED' : 'UNFOCUSED';
            badge.className = 'badge ' + (focused ? 'badge-green' : 'badge-amber');
            appendLog('in', `updateFocusLabel("${msg}")`);
        };

        function sendInputData() {
            const val = document.getElementById('data-input').value;
            if (!val) return;
            appendLog('out', `sendDataToF4SE("${val}")`);
            window.sendDataToF4SE(val);
            document.getElementById('data-input').value = '';
        }
    </script>
</body>
</html>
